name: MineCore CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Next.js Frontend Verification ───────────────────────────────────────────
  frontend-ci:
    name: Validate Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Format Check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Type Check Frontend
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build Validation
        run: npm run build
        working-directory: frontend

  # ── Express.js Backend Verification ──────────────────────────────────────────
  backend-ci:
    name: Validate Express.js Backend
    runs-on: ubuntu-latest
    env:
      # Dummy DATABASE_URL so Prisma can validate schema and generate client
      # without a live database. No actual DB connection is made during CI.
      DATABASE_URL: "postgresql://ci_user:ci_pass@localhost:5432/ci_db?schema=public"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: backend

      - name: Validate Prisma Schema
        run: npx prisma validate
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Type Check Backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: Build Validation
        run: npm run build
        working-directory: backend

      - name: Run Tests
        run: npm run test
        working-directory: backend

  # ── Docker Image Build Verification ─────────────────────────────────────────
  docker-ci:
    name: Verify Container Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: minecore-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: minecore-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Compose Configuration Validation ──────────────────────────────────
  compose-ci:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Compose File
        run: docker compose config

  # ── Security Auditing (DevSecOps) ───────────────────────────────────────────
  security-ci:
    name: Security Audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend Security Audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true # Non-blocking warnings

      - name: Backend Security Audit
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true # Non-blocking warnings
