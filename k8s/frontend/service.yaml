# ─────────────────────────────────────────────────────────────────────────────
# MineCore — Frontend ClusterIP Service
# File: k8s/frontend/service.yaml
# Phase: K8s-5 Frontend Deployment
#
# Service type: ClusterIP
#   → reachable only from within the cluster. External requests route through Ingress.
#   → Selects pods matching frontend component labels.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: minecore-frontend-svc
  namespace: minecore
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: minecore
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: minecore
    app.kubernetes.io/managed-by: kubectl
    environment: development
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: minecore
  ports:
    - name: http
      protocol: TCP
      port: 3000          # Service port (cluster-internal)
      targetPort: http    # Pod target port reference (http = 3000)
