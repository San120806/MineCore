# ─────────────────────────────────────────────────────────────────────────────
# MineCore — PostgreSQL StatefulSet
# Objective 3.5: PostgreSQL Deployment
#
# Why StatefulSet (not Deployment)?
#   - StatefulSets provide stable network identity (pod name never changes)
#   - Guarantees ordered, graceful startup and shutdown
#   - Designed for stateful workloads like databases
#   - Works correctly with PVC binding and data integrity
#
# Key design decisions:
#   - PGDATA set to /var/lib/postgresql/data/pgdata (subdirectory)
#     → Avoids 'lost+found' directory conflict on freshly provisioned volumes
#   - Credentials injected individually via secretKeyRef (not envFrom)
#     → Only exposes the 3 keys postgres needs, not all 6 secrets
#   - Liveness probe uses pg_isready via shell to expand env vars
#   - imagePullPolicy: IfNotPresent (uses local image if available)
#
# Depends on:
#   - namespace:  minecore (namespace.yaml)
#   - secret:     minecore-app-secret (secrets/app-secret.yaml)
#   - pvc:        minecore-postgres-pvc (storage/postgres-pvc.yaml)
#   - service:    minecore-postgres-svc (postgres/service.yaml)
#
# Apply Order: #6 — After PVC and secrets; before backend deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecore-postgres
  namespace: minecore
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: minecore
    app.kubernetes.io/version: "15"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: minecore
    app.kubernetes.io/managed-by: kubectl
    environment: development
spec:
  serviceName: minecore-postgres-svc   # Must match the ClusterIP service name
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: minecore

  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: minecore
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: minecore
        environment: development

    spec:
      # ── Graceful termination: allow postgres to flush WAL before shutdown ──
      terminationGracePeriodSeconds: 60

      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          # ── Environment Variables ──────────────────────────────────────────
          # Credentials injected individually from Secret (not envFrom)
          # Only exposes the 3 keys postgres needs — principle of least privilege
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: minecore-app-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecore-app-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: minecore-app-secret
                  key: POSTGRES_DB

            # PGDATA must be a subdirectory of the mount point.
            # rancher.io/local-path provisions raw directories that may contain
            # system files (e.g. lost+found). PostgreSQL refuses to initialise
            # into a non-empty directory, so we use a clean subdirectory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          # ── Volume Mount ───────────────────────────────────────────────────
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          # ── Resource Limits ────────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"        # 0.25 CPU cores guaranteed
              memory: "512Mi"    # 512 MiB RAM guaranteed
            limits:
              cpu: "1000m"       # Max 1 CPU core
              memory: "1Gi"      # Max 1 GiB RAM

          # ── Liveness Probe ─────────────────────────────────────────────────
          # Restarts the pod if PostgreSQL stops accepting connections
          # Uses shell to expand the $POSTGRES_USER env var
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready --host 127.0.0.1 --port 5432 --username "$POSTGRES_USER"
            initialDelaySeconds: 30    # Wait 30s before first check (DB init time)
            periodSeconds: 10          # Check every 10 seconds
            timeoutSeconds: 5          # Fail if no response in 5 seconds
            failureThreshold: 5        # 5 failures before pod is restarted

          # ── Readiness Probe ────────────────────────────────────────────────
          # Removes pod from service endpoints until PostgreSQL is ready
          # Backend will not receive traffic until this passes
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready --host 127.0.0.1 --port 5432 --username "$POSTGRES_USER"
            initialDelaySeconds: 5     # Start checking after 5s
            periodSeconds: 5           # Check every 5 seconds
            timeoutSeconds: 3          # Fail if no response in 3 seconds
            failureThreshold: 3        # 3 failures before marked NotReady

      # ── Volumes ─────────────────────────────────────────────────────────────
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: minecore-postgres-pvc   # Binds to PVC from Objective 3.4
